<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weighted GPA Calculator</title>
</head>
<body>
    <script>
      // create variables
    let letterGrade = "";
    let numCredits = 0;
    let singleClassGPA = 0;
    let creditSum = 0;
    let runningGPSum = 0;
    let finalGPA = 0;
    let classGPAs = [];
    let classWeights = [];

      // Write a program that asks a user for the number of classes they are taking.
    let numClasses = Number(prompt("How many classes in this semester?"));

      // for loop for classes
    for (let counter = 0; counter < numClasses; counter++) {
        //gather user input
        letterGrade = prompt(
        "What is your letter grade for class" + (counter + 1)
        );
        numCredits = Number(
        prompt(`How many credits was class ${counter + 1} worth`)
        );
        //if statement to convert grades
        // Convert Letter Grade to GPA
        if (letterGrade === "A") {
            singleClassGPA = 4.0;
        } else if (letterGrade === "A-") {
            singleClassGPA = 3.7;
        } else if (letterGrade === "B+") {
            singleClassGPA = 3.3;
        } else if (letterGrade === "B") {
            singleClassGPA = 3.0;
        } else if (letterGrade === "B-") {
            singleClassGPA = 2.7;
        } else if (letterGrade === "C+") {
            singleClassGPA = 2.3;
        } else if (letterGrade === "C") {
            singleClassGPA = 2.0;
        } else if (letterGrade === "C-") {
            singleClassGPA = 1.7;
        } else if (letterGrade === "D+") {
            singleClassGPA = 1.3;
        } else if (letterGrade === "D") {
            singleClassGPA = 1.0;
        } else if (letterGrade === "D-") {
            singleClassGPA = 0.7;
        } else {
            singleClassGPA = 0.0;
        }
        classGPAs.push(singleClassGPA);
        classWeights.push(numCredits);

    }
      //for loop for calc
    for(let counter2 = 0; counter2<classGPAs.length; counter2++){
        // calc the sum of GP * Credits
        runningGPSum += classGPAs[counter2] * classWeights[counter2];
        // keep running sum
        creditSum += classWeights[counter2];
    }
    finalGPA = runningGPSum / creditSum;

      //if statement
    // Final GPA message
    if(finalGPA >= 3.3){
        alert(`Your GPA is ${finalGPA}. Great job! Your consistent effort is paying off. Keep challenging yourself and building on this progress.`);
    }
    else if(finalGPA >= 2.3){
        alert(`Your GPA is ${finalGPA}. You're making steady progress, and every bit of effort helps you grow. Keep developing your skills step by step.`);
    }   
    else{
        alert(`Your GPA is ${finalGPA}. Remember that everyone learns at a different pace. Stay persistent, and make use of resources like study groups, tutoring, or advisors to support your learning journey.`);
    }
    

    </script>
</body>
</html>
